<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta property="og:title" content="题库刷题 — 在线练习平台">
    <meta property="og:description" content="支持多题库在线刷题，选择题库开始练习。">
    <meta property="og:type" content="website">
    <meta name="description" content="在线刷题平台，支持多题库、答案解析、进度追踪。">
    <title>题库刷题 — 在线练习平台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563EB' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4 19.5A2.5 2.5 0 0 1 6.5 17H20'/><path d='M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z'/></svg>">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563EB' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4 19.5A2.5 2.5 0 0 1 6.5 17H20'/><path d='M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z'/></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">跳转到主要内容</a>
    <noscript>
        <div style="text-align:center;padding:60px 20px;font-family:sans-serif;color:#333">
            <h2>需要启用 JavaScript</h2>
            <p>本题库网站需要 JavaScript 支持才能正常运行，请在浏览器设置中启用后刷新页面。</p>
        </div>
    </noscript>
    <header id="app-header">
        <div class="header-left">
            <h1>题库刷题</h1>
            <span class="header-subtitle">选择题库开始练习</span>
        </div>
        <div class="header-stats" id="header-stats">
            <span class="stat-item">已答 <strong id="stat-answered">0</strong> / <strong id="stat-total">--</strong></span>
            <span class="stat-item stat-correct">正确 <strong id="stat-correct">0</strong></span>
            <span class="stat-item stat-incorrect">错误 <strong id="stat-incorrect">0</strong></span>
        </div>
        <div class="header-actions">
            <button id="back-to-list-btn" class="header-icon-btn hidden" aria-label="返回题单" title="返回题单">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button id="export-btn" class="header-icon-btn" aria-label="导出进度" title="导出进度">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            <button id="import-btn" class="header-icon-btn" aria-label="导入进度" title="导入进度">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </button>
            <input type="file" id="import-file" accept=".json" style="display:none" aria-label="导入进度文件">
            <button id="sidebar-toggle" class="sidebar-toggle" aria-label="切换题号面板" title="切换题号面板">
                <span class="hamburger-icon"></span>
            </button>
            <button id="admin-btn" class="header-icon-btn hidden" aria-label="管理员面板" title="管理员面板">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
            <button id="theme-toggle" class="theme-toggle" aria-label="切换暗色模式" title="切换暗色模式">
                <span class="theme-icon-light"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
                <span class="theme-icon-dark hidden"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
            </button>
        </div>
    </header>

    <!-- ===== Select Page (Home) ===== -->
    <section id="select-page">
        <div class="select-page-container">
            <div class="select-page-search">
                <div class="search-box select-search-box">
                    <input type="text" id="bank-search-input" placeholder="搜索题库名称、描述、题型..." aria-label="搜索题库">
                    <button id="bank-search-clear" class="search-clear hidden" aria-label="清除搜索">&times;</button>
                    <span class="search-count hidden" id="bank-search-count" aria-live="polite"></span>
                </div>
            </div>
            <div class="bank-group-tabs" id="bank-group-tabs"></div>
        <div id="banks-container" class="banks-grid"></div>
        </div>
    </section>

    <!-- ===== Quiz Page ===== -->
    <section id="quiz-page" class="hidden">
        <div id="sidebar-backdrop" class="sidebar-backdrop" aria-hidden="true"></div>
        <div id="app-container">
            <aside id="sidebar" aria-label="题目导航">
                <div class="sidebar-stats" id="sidebar-stats">
                    <div class="sidebar-stat-card stat-answered-card">
                        <div class="stat-num" id="sidebar-answered">0</div>
                        <div class="stat-label">已答</div>
                    </div>
                    <div class="sidebar-stat-card stat-correct-card">
                        <div class="stat-num" id="sidebar-correct">0</div>
                        <div class="stat-label">正确</div>
                    </div>
                    <div class="sidebar-stat-card stat-incorrect-card">
                        <div class="stat-num" id="sidebar-incorrect">0</div>
                        <div class="stat-label">错误</div>
                    </div>
                </div>
                <div class="progress-bar-wrap" id="progress-bar-wrap">
                    <div class="progress-bar-label">
                        <span>完成进度</span>
                        <span id="progress-pct" role="status">0%</span>
                    </div>
                    <div class="progress-bar-track">
                        <div class="progress-bar-fill" id="progress-fill"></div>
                    </div>
                </div>
                <div class="filter-tabs" id="filter-tabs" role="tablist" aria-label="题目类型筛选">
                    <button data-filter="all" class="active" role="tab" aria-selected="true" aria-controls="question-grid">全部</button>
                    <button data-filter="single" role="tab" aria-selected="false" aria-controls="question-grid">单选</button>
                    <button data-filter="multiple" role="tab" aria-selected="false" aria-controls="question-grid">多选</button>
                    <button data-filter="tf" role="tab" aria-selected="false" aria-controls="question-grid">判断</button>
                    <button data-filter="fill" role="tab" aria-selected="false" aria-controls="question-grid">填空</button>
                    <button data-filter="short" role="tab" aria-selected="false" aria-controls="question-grid">简答</button>
                    <button data-filter="analysis" role="tab" aria-selected="false" aria-controls="question-grid">分析</button>
                    <button data-filter="wrong" role="tab" aria-selected="false" aria-controls="question-grid">错题重做</button>
                    <button data-filter="bookmarked" role="tab" aria-selected="false" aria-controls="question-grid">已收藏</button>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索题目关键词..." aria-label="搜索题目">
                    <button id="search-clear" class="search-clear hidden" aria-label="清除搜索">&times;</button>
                    <span class="search-count hidden" id="search-count" aria-live="polite"></span>
                </div>
                <div id="question-grid" role="tabpanel" aria-label="题目列表"></div>
                <div class="sidebar-legend">
                    <span class="legend-item"><span class="dot dot-unanswered"></span>未答</span>
                    <span class="legend-item"><span class="dot dot-correct"></span>正确</span>
                    <span class="legend-item"><span class="dot dot-incorrect"></span>错误</span>
                    <span class="legend-item"><span class="dot dot-revealed"></span>已看</span>
                    <span class="legend-item"><span class="dot dot-bookmarked"></span>收藏</span>
                </div>
            </aside>

            <main id="main-content">
                <div id="question-card">
                    <div class="question-header">
                        <span class="question-badge" id="question-badge">加载中...</span>
                        <span class="question-number" id="question-number"></span>
                        <button id="bookmark-btn" class="bookmark-btn" aria-label="收藏题目" title="收藏此题">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        </button>
                    </div>
                    <div class="question-text" id="question-text"></div>
                    <div class="question-options" id="question-options"></div>
                    <div class="answer-section" id="answer-section">
                        <button id="show-answer-btn" class="btn-show-answer">显示答案与解析</button>
                        <div id="answer-content" class="answer-content hidden" aria-live="polite">
                            <div id="answer-feedback" class="sr-only" aria-live="polite"></div>
                            <div class="correct-answer">
                                <span class="answer-label">正确答案</span>
                                <div class="answer-value" id="correct-answer-text"></div>
                            </div>
                            <div class="explanation" id="explanation-area">
                                <span class="answer-label">解析</span>
                                <div class="explanation-value" id="explanation-text"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="navigation-bar">
                    <button id="prev-btn" class="btn-nav">上一题</button>
                    <span class="nav-progress" id="nav-progress">-- / --</span>
                    <button id="next-btn" class="btn-nav">下一题</button>
                    <button id="submit-btn" class="btn-submit">查看统计</button>
                </div>
            </main>
        </div>
    </section>

    <!-- ===== Admin Page ===== -->
    <section id="admin-page" class="hidden">
        <div class="admin-container">
            <div class="admin-header">
                <h2>管理员面板</h2>
                <p class="admin-subtitle">管理题库和分组标签</p>
            </div>

            <div class="admin-section">
                <h3 class="admin-section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    题单上传
                </h3>
                <div class="admin-upload-area" id="admin-upload-area">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
                    <p>拖拽 <strong>.md</strong> 或 <strong>.json</strong> 文件到此处</p>
                    <p>或</p>
                    <button class="admin-upload-trigger" id="admin-upload-trigger">选择文件</button>
                    <input type="file" id="admin-file-input" accept=".md,.txt,.markdown,.json" style="display:none">
                </div>
                <div class="admin-upload-form hidden" id="admin-upload-form">
                    <div class="admin-form-row">
                        <div class="admin-form-group">
                            <label for="admin-upload-name">题库名称</label>
                            <input type="text" id="admin-upload-name" class="admin-input" placeholder="输入题库名称">
                        </div>
                        <div class="admin-form-group admin-form-icon">
                            <label for="admin-upload-icon">图标</label>
                            <input type="text" id="admin-upload-icon" class="admin-input" placeholder="📚" maxlength="4">
                        </div>
                    </div>
                    <div class="admin-form-group">
                        <label for="admin-upload-desc">描述</label>
                        <input type="text" id="admin-upload-desc" class="admin-input" placeholder="输入题库描述">
                    </div>
                    <div class="admin-form-group">
                        <label for="admin-upload-group">分组</label>
                        <select id="admin-upload-group" class="admin-select">
                            <option value="">-- 选择分组 --</option>
                        </select>
                    </div>
                    <div class="admin-form-group">
                        <label>预览</label>
                        <div id="admin-upload-preview" class="admin-upload-preview"></div>
                    </div>
                    <div class="admin-form-actions">
                        <button class="btn-nav" id="admin-upload-cancel">取消</button>
                        <button class="btn-submit" id="admin-upload-confirm">确认上传</button>
                    </div>
                </div>
            </div>

            <div class="admin-section">
                <h3 class="admin-section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    题单管理
                </h3>
                <div id="admin-bank-list" class="admin-bank-list"></div>
            </div>

            <div class="admin-section">
                <h3 class="admin-section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    分组标签
                </h3>
                <div id="admin-group-list" class="admin-group-list"></div>
                <div class="admin-group-add">
                    <input type="text" id="admin-new-group-input" class="admin-input" placeholder="输入新分组名称...">
                    <button class="btn-submit" id="admin-add-group-btn">添加</button>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== Modals ===== -->
    <div id="result-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h2 id="modal-title">测验结果</h2>
            <div id="result-summary"></div>
            <div class="modal-actions">
                <button id="review-btn" class="btn-nav">查看答题情况</button>
                <button id="restart-btn" class="btn-submit">重新开始</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h2 id="confirm-title">确认操作</h2>
            <div id="confirm-message" class="confirm-message"></div>
            <div class="modal-actions">
                <button id="confirm-cancel" class="btn-nav">取消</button>
                <button id="confirm-ok" class="btn-submit">确认</button>
            </div>
        </div>
    </div>

    <!-- Keyboard Shortcuts Modal -->
    <div id="shortcut-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="shortcut-title">
        <div class="modal-overlay"></div>
        <div class="modal-content shortcut-content">
            <h2 id="shortcut-title">键盘快捷键</h2>
            <div class="shortcut-grid">
                <div class="shortcut-item"><kbd>←</kbd> <kbd>→</kbd><span>上/下一题</span></div>
                <div class="shortcut-item"><kbd>1</kbd>–<kbd>9</kbd><span>选择选项</span></div>
                <div class="shortcut-item"><kbd>A</kbd>–<kbd>E</kbd><span>选择选项</span></div>
                <div class="shortcut-item"><kbd>Enter</kbd> / <kbd>Space</kbd><span>提交答案</span></div>
                <div class="shortcut-item"><kbd>B</kbd><span>收藏/取消</span></div>
                <div class="shortcut-item"><kbd>?</kbd><span>显示快捷键</span></div>
                <div class="shortcut-item"><kbd>Esc</kbd><span>关闭弹窗</span></div>
            </div>
            <div class="modal-actions"><button class="btn-submit shortcut-close-btn">知道了</button></div>
        </div>
    </div>

    <!-- Admin Password Modal -->
    <div id="admin-pwd-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="admin-pwd-title">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h2 id="admin-pwd-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-4px;margin-right:6px;color:var(--accent)"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                管理员验证
            </h2>
            <p class="confirm-message">请输入管理员密码以继续</p>
            <div class="admin-pwd-field">
                <input type="password" id="admin-pwd-input" class="admin-input admin-pwd-input" placeholder="请输入密码" autocomplete="off">
                <p id="admin-pwd-error" class="admin-pwd-error hidden">密码错误，请重试</p>
            </div>
            <div class="modal-actions">
                <button id="admin-pwd-cancel" class="btn-nav">取消</button>
                <button id="admin-pwd-ok" class="btn-submit">确认</button>
            </div>
        </div>
    </div>

    <!-- ===== Toast Container ===== -->
    <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

    <!-- Scripts: load order matters -->
    <script src="db.js"></script>
    <script src="router.js"></script>
    <script src="quiz-core.js"></script>
    <script src="quiz-select.js"></script>
    <script src="admin.js"></script>
    <!-- 题库文件 — 添加新题库只需加一行 -->
    <script src="bank-java.js"></script>
    <script src="bank-database.js"></script>
    <script>
    // ===== Bootstrap =====
    (function() {
        // Register routes
        Router.register('', function() { QuizSelect.showSelectPage(); animatePage('select-page'); });
        Router.register('quiz', function(bankId) {
            if (!bankId) { Router.navigate('/'); return; }
            if (typeof destroyQuizPage === 'function') destroyQuizPage();
            document.getElementById('select-page').classList.add('hidden');
            document.getElementById('admin-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            animatePage('quiz-page');
            // Restore header for quiz mode
            restoreQuizHeader();
            // Init quiz
            initQuizPage(bankId);
        });
        Router.register('admin', function() {
            if (typeof destroyQuizPage === 'function') destroyQuizPage();
            document.getElementById('select-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.add('hidden');
            AdminPanel.showAdminPage();
            animatePage('admin-page');
        });

        // Admin button in header
        document.getElementById('admin-btn').addEventListener('click', function() {
            Router.navigate('admin');
        });

        // Back button in header
        document.getElementById('back-to-list-btn').addEventListener('click', function() {
            if (typeof destroyQuizPage === 'function') destroyQuizPage();
            Router.navigate('/');
        });

        // Apply global theme on load (respect system preference)
        var savedTheme = localStorage.getItem('quiz_theme') ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = savedTheme === 'dark' ? '#0f172a' : '#f8fafc';

        // Bind theme toggle early (before entering quiz page)
        var themeBtn = document.getElementById('theme-toggle');
        if (themeBtn) {
            // Update icon visibility on load
            var lightIcon = themeBtn.querySelector('.theme-icon-light');
            var darkIcon = themeBtn.querySelector('.theme-icon-dark');
            if (lightIcon) lightIcon.classList.toggle('hidden', savedTheme === 'dark');
            if (darkIcon) darkIcon.classList.toggle('hidden', savedTheme === 'light');
            themeBtn.addEventListener('click', function() {
                if (typeof toggleTheme === 'function') toggleTheme();
            });
        }

        // Init modules
        QuizSelect.init();
        AdminPanel.init();

        // Debug: write to DOM to trace execution
        var __dbg = document.getElementById('banks-container');
        __dbg.setAttribute('data-debug', 'bootstrap-start');

        // Init DB then start router
        QuizDB.init().then(function() {
            __dbg.setAttribute('data-debug', 'db-ready');
            Router.init();
            __dbg.setAttribute('data-debug', 'router-init-done:' + __dbg.innerHTML.length);
        }).catch(function(e) {
            __dbg.setAttribute('data-debug', 'db-failed:' + e.message);
            // Fallback: still show select page
            Router.init();
        });

        // Fallback: if init takes too long, start router anyway
        setTimeout(function() {
            if (!__dbg.getAttribute('data-debug') || __dbg.getAttribute('data-debug') === 'bootstrap-start') {
                __dbg.setAttribute('data-debug', 'timeout-fallback');
                Router.init();
            }
        }, 3000);

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function(e) { console.warn('SW registration failed:', e); });
        }
    })();

    function restoreQuizHeader() {
        var headerStats = document.getElementById('header-stats');
        if (headerStats) headerStats.style.display = '';
        var headerActions = document.querySelector('.header-actions');
        if (headerActions) {
            var btns = headerActions.querySelectorAll('button');
            btns.forEach(function(b) {
                b.style.display = '';
            });
        }
        var backBtn = document.getElementById('back-to-list-btn');
        if (backBtn) backBtn.classList.remove('hidden');
    }

    function animatePage(pageId) {
        var page = document.getElementById(pageId);
        if (!page) return;
        page.classList.remove('page-entering');
        // Force reflow to restart animation
        void page.offsetWidth;
        page.classList.add('page-entering');
    }

    // ===== Global Toast Notification System =====
    var TOAST_ICONS = {
        success: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
        error: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        warning: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
        info: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
    };

    function showToast(message, type, duration) {
        type = type || 'info';
        duration = duration || 3500;
        var container = document.getElementById('toast-container');
        if (!container) return;

        var toast = document.createElement('div');
        toast.className = 'toast toast-' + type;
        toast.setAttribute('role', 'status');

        var iconSpan = document.createElement('span');
        iconSpan.className = 'toast-icon';
        iconSpan.innerHTML = TOAST_ICONS[type] || TOAST_ICONS.info;

        var msgSpan = document.createElement('span');
        msgSpan.className = 'toast-message';
        msgSpan.textContent = message;

        var closeBtn = document.createElement('button');
        closeBtn.className = 'toast-close';
        closeBtn.setAttribute('aria-label', '关闭');
        closeBtn.innerHTML = '&times;';
        closeBtn.addEventListener('click', function() { removeToast(toast); });

        toast.appendChild(iconSpan);
        toast.appendChild(msgSpan);
        toast.appendChild(closeBtn);
        container.appendChild(toast);

        if (duration > 0) {
            setTimeout(function() { removeToast(toast); }, duration);
        }
        return toast;
    }

    function removeToast(toast) {
        if (!toast || toast.classList.contains('toast-exit')) return;
        toast.classList.add('toast-exit');
        setTimeout(function() {
            if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 250);
    }

    // ===== Global Confirm Dialog =====
    var _confirmState = null;

    function showConfirm(title, message, onOk) {
        var modal = document.getElementById('confirm-modal');
        var titleEl = document.getElementById('confirm-title');
        var msgEl = document.getElementById('confirm-message');
        var okBtn = document.getElementById('confirm-ok');
        var cancelBtn = document.getElementById('confirm-cancel');
        var overlay = modal ? modal.querySelector('.modal-overlay') : null;
        if (!modal) { if (onOk) onOk(); return; }

        if (titleEl) titleEl.textContent = title || '确认操作';
        if (msgEl) msgEl.textContent = message || '';

        // Cleanup previous
        if (_confirmState) _confirmState.cleanup();
        modal.classList.remove('hidden');

        function onConfirm() { cleanup(); modal.classList.add('hidden'); if (onOk) onOk(); }
        function onCancel() { cleanup(); modal.classList.add('hidden'); }
        function onOverlayClick(e) { if (e.target === overlay) onCancel(); }
        function onKey(e) { if (e.key === 'Enter') onConfirm(); if (e.key === 'Escape') onCancel(); }
        function cleanup() {
            if (okBtn) okBtn.removeEventListener('click', onConfirm);
            if (cancelBtn) cancelBtn.removeEventListener('click', onCancel);
            if (overlay) overlay.removeEventListener('click', onOverlayClick);
            document.removeEventListener('keydown', _confirmKeyHandler);
            _confirmState = null;
        }
        function _confirmKeyHandler(e) { onKey(e); }

        _confirmState = { cleanup: cleanup };

        if (okBtn) okBtn.addEventListener('click', onConfirm);
        if (cancelBtn) cancelBtn.addEventListener('click', onCancel);
        if (overlay) overlay.addEventListener('click', onOverlayClick);
        document.addEventListener('keydown', _confirmKeyHandler);
        okBtn.focus();
    }

    // ===== Global Inline Form Validation Helpers =====
    function showFieldError(input, message) {
        clearFieldError(input);
        input.classList.add('field-error');
        var msg = document.createElement('span');
        msg.className = 'field-error-msg';
        msg.textContent = message;
        input.parentNode.appendChild(msg);
        input.focus();
    }
    function clearFieldError(input) {
        input.classList.remove('field-error');
        var existing = input.parentNode.querySelector('.field-error-msg');
        if (existing) existing.parentNode.removeChild(existing);
    }
    function clearAllFieldErrors(container) {
        if (!container) return;
        var errors = container.querySelectorAll('.field-error');
        for (var i = 0; i < errors.length; i++) errors[i].classList.remove('field-error');
        var msgs = container.querySelectorAll('.field-error-msg');
        for (var j = 0; j < msgs.length; j++) msgs[j].parentNode.removeChild(msgs[j]);
    }
    </script>
</body>
